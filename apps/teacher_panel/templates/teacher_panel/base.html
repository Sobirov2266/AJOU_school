{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Teacher Panel{% endblock %}</title>

    <link rel="stylesheet" href="{% static 'css/teacher_sidebar.css' %}">
    <link rel="stylesheet" href="{% static 'css/teacher_subjects.css' %}">
    <link rel="stylesheet" href="{% static 'css/admin_dashboard.css' %}">
    <link rel="stylesheet" href="{% static 'css/admin_teacher_list.css' %}">
    <link rel="stylesheet" href="{% static 'css/admin_students.css' %}">
    <link rel="stylesheet" href="{% static 'css/admin_classes.css' %}">
    <link rel="stylesheet" href="{% static 'css/admin_class_subjects.css' %}">
    <link rel="stylesheet" href="{% static 'css/admin_notifications.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    {% block extra_css %}{% endblock %}
</head>
<body>

{% include 'teacher_panel/sidebar.html' %}

{% if messages %}
    <div class="admin-toast-container" id="adminToastContainer" aria-live="polite" aria-atomic="true">
        {% for message in messages %}
            <div
                class="admin-toast admin-toast--{% if 'error' in message.tags %}error{% elif 'success' in message.tags %}success{% elif 'warning' in message.tags %}warning{% else %}info{% endif %}"
                role="alert"
                data-autodismiss="1"
            >
                <div class="admin-toast__bar" aria-hidden="true"></div>
                <div class="admin-toast__content">{{ message }}</div>
                <button type="button" class="admin-toast__close" aria-label="Yopish" data-admin-toast-close>×</button>
            </div>
        {% endfor %}
    </div>
{% endif %}

<div class="main-content-wrapper">
    <div class="main-content">
        {% block content %}{% endblock %}
    </div>
</div>

<script src="{% static 'js/admin_notifications.js' %}"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
